<!DOCTYPE html>
<!--
=============================================================================
 Neural Oscilloscope — Real-time Physiological Signal Monitoring Panel
 Frontend: D3.js rendering + WebSocket data stream + industrial HMI styling

 Overview:
   This HTML file implements a browser-based oscilloscope that visualizes raw
   physiological signals (e.g., EEG/ECG) against neural network predictions in
   real time. It is designed for research scenarios where immediate visual
   feedback on model performance is critical — for instance, when comparing a
   learned dynamics model against live sensor readings.

 How to use:
   1. Start the WebSocket inference server:  python sever.py
   2. Open this file in any modern browser (Chrome / Edge / Firefox).
   3. The panel auto-connects to ws://127.0.0.1:8765 and begins rendering.

 Dependencies:
   - d3.v7.min.js : D3.js v7 local copy (273 KB). Originally served from CDN
     (d3js.org), now bundled locally to eliminate external network dependencies.
   - WebSocket   : Connects to ws://127.0.0.1:8765 (localhost), no internet required.

 Visual design (research-oriented HMI):
   1. Black background + white dashed graticule — emulates a physical oscilloscope.
   2. CH1 yellow solid line (ground truth) + CH2 green dashed line (prediction) —
      standard industrial signal color coding for intuitive human review.
   3. Right-side SCADA telemetry panel — digital readouts + error monitoring.
   4. WebSocket auto-reconnect with status LED — emulates device online/offline
      state machine; resilient to transient network drops.
   5. D3.js high-performance rendering — 150-point sliding window, ~30 FPS.
   6. Flex layout — 3:1 left oscilloscope / right telemetry split, responsive.

 Research significance:
   Real-time visualization closes the loop between model output and human
   intuition. In physiological signal modeling, seeing prediction waveforms
   side-by-side with ground truth allows researchers to quickly identify
   failure modes (phase lag, amplitude drift, missed anomalies) that scalar
   loss metrics alone may obscure.
=============================================================================
-->
<html>
<head>
  <meta charset="UTF-8">
  <!-- D3.js v7 本地副本 — 原 CDN (d3js.org) 国内访问受限，本地化后无需翻墙 -->
  <script src="d3.v7.min.js"></script>
  <style>
    .led.online { background-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
    /* 核心布局：flex 左右分栏 — 左侧波形示波器 (3) + 右侧遥测面板 (1) */
    .main-container {
      display: flex;
      flex: 1;
      padding: 15px;
      gap: 15px;
    }
    /* 黑色底面 + 白色虚线网格 (dasharray 2,8 — sparser than waveform dashes) */
    .oscilloscope-panel {
      flex: 3;
      background-color: #000000;
      border: 1px solid #333;
      position: relative;
      border-radius: 4px;
      box-shadow: inset 0 0 20px rgba(0,0,0,1);
    }
    /* 右侧遥测数据面板 */
    .telemetry-panel {
      flex: 1;
      background-color: #111;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    /* 仪表盘数据块样式 */
    .data-block {
      background: #1a1a1a;
      border-left: 4px solid #555;
      padding: 15px;
      border-radius: 2px;
    }
    /* 面板左边框颜色跟随波形 — CH1 黄色, CH2 绿色 */
    .data-block.ch1 { border-left-color: #ffdd00; }
    .data-block.ch2 { border-left-color: #00ff00; }
    .data-block.alert { border-left-color: #ffaa00; }
    .data-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }
    .data-value {
      font-size: 32px;
      font-weight: bold;
      font-family: 'Courier New', Courier, monospace;
    }
    /* 数值颜色跟随通道 */
    .data-value.ch1-text { color: #ffdd00; text-shadow: 0 0 8px rgba(255,221,0,0.4); }
    .data-value.ch2-text { color: #00ff00; text-shadow: 0 0 8px rgba(0,255,0,0.4); }
    .data-value.alert-text { color: #ffaa00; }
    /* D3.js SVG 样式 */
    svg { width: 100%; height: 100%; display: block; }
    /* 白色虚线网格（比 CH2 绿色虚线更稀疏） */
    .grid line { stroke: #444; stroke-width: 1px; stroke-dasharray: 2,8; }
    .grid path { stroke-width: 0; }
    .axis text { fill: #888; font-size: 10px; font-family: monospace; }
    .axis path, .axis line { stroke: #555; }
    /* 波形线条样式（带辉光） — CH1 黄色实线 */
    .line-ch1 {
      fill: none;
      stroke: #ffdd00;
      stroke-width: 2px;
      filter: drop-shadow(0 0 4px rgba(255,221,0,0.8));
    }
    /* CH2 绿色虚线 */
    .line-ch2 {
      fill: none;
      stroke: #00ff00;
      stroke-width: 2px;
      stroke-dasharray: 4,4;
      filter: drop-shadow(0 0 4px rgba(0,255,0,0.8));
    }
  </style>
</head>
<body>
<div class="top-bar">
  <div class="sys-title">Neural Oscilloscope // SCADA Terminal</div>
  <div class="status-indicator">
    <span id="model-badge" style="color: #888;">MODEL: [WAITING]</span>
    <span>|</span>
    <span id="status-text" style="color: #ff3333;">SYS OFFLINE</span>
    <div id="led-bulb" class="led"></div>
  </div>
</div>
<div class="main-container">
  <div class="oscilloscope-panel" id="chart-container">
  </div>
  <div class="telemetry-panel">
    <div class="data-block ch1">
      <div class="data-label">CH1: 真实生理波形 (Raw EEG)</div>
      <div class="data-value ch1-text" id="val-ch1">0.000</div>
    </div>
    <div class="data-block ch2">
      <div class="data-label">CH2: 神经网络预测 (Predict)</div>
      <div class="data-value ch2-text" id="val-ch2">0.000</div>
    </div>
    <div class="data-block alert">
      <div class="data-label">Δ 实时绝对误差 (Loss)</div>
      <div class="data-value alert-text" id="val-error">0.000</div>
    </div>
    <div class="data-block" style="border-left-color: #444;">
      <div class="data-label">SYS 链路延迟 (Latency)</div>
      <div class="data-value" id="val-latency" style="color: #ccc; font-size: 24px;">0 ms</div>
    </div>
  </div>
</div>
<script>
  // =========================================================================
  //  D3.js 工业示波器引擎 + WebSocket 实时遥测数据接入
  //  注意: D3.js 使用本地副本 d3.v7.min.js，WebSocket 连接本机 ws://127.0.0.1:8765
  //  两者均不依赖外网。
  // =========================================================================
  // 1. 初始化 D3 画布与自适应缩放
  const container = document.getElementById("chart-container");
  // 窗口数据点容量（工业示波器一屏显示的采样点数）
  const MAX_POINTS = 150;
  let dataBuffer = [];
  // 获取容器实际宽高以充满面板
  const width = container.clientWidth;
  const height = container.clientHeight;
  const margin = {top: 20, right: 20, bottom: 20, left: 40};
  const innerWidth = width - margin.left - margin.right;
  const innerHeight = height - margin.top - margin.bottom;
  const svg = d3.select("#chart-container").append("svg")
    .attr("width", width)
    .attr("height", height);
  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);
  // 比例尺
  const xScale = d3.scaleLinear().domain([0, MAX_POINTS - 1]).range([0, innerWidth]);
  // 动态 Y 轴范围 — 初始设为宽域，随数据自动扩展，保证极大值极小值都包含在内
  let yMin = -5, yMax = 5;
  const yScale = d3.scaleLinear().domain([yMin, yMax]).range([innerHeight, 0]);
  // 网格与坐标轴容器（后续随 Y 轴范围更新需重绘）
  const gridGroup = g.append("g").attr("class", "grid");
  const axisGroup = g.append("g").attr("class", "axis");
  // 绘制暗黑工业网格
  function redrawGridAndAxis() {
    yScale.domain([yMin, yMax]);
    gridGroup.selectAll("*").remove();
    gridGroup.call(d3.axisLeft(yScale).ticks(10).tickSize(-innerWidth).tickFormat(""));
    g.selectAll(".grid-bottom").remove();
    g.append("g").attr("class", "grid grid-bottom")
      .attr("transform", `translate(0,${innerHeight})`)
      .call(d3.axisBottom(xScale).ticks(20).tickSize(-innerHeight).tickFormat(""));
    axisGroup.selectAll("*").remove();
    axisGroup.call(d3.axisLeft(yScale).ticks(5));
  }
  redrawGridAndAxis();
  // 定义线条生成器
  const lineCh1 = d3.line().x((d, i) => xScale(i)).y(d => yScale(d.ch1_actual));
  const lineCh2 = d3.line().x((d, i) => xScale(i)).y(d => yScale(d.ch2_predict));
  // 创建路径
  const pathCh1 = g.append("path").attr("class", "line-ch1");
  const pathCh2 = g.append("path").attr("class", "line-ch2");
  // ---------------------------------------------------------
  // 2. DOM 元素绑定 — 仪表盘数字遥测读数
  // ---------------------------------------------------------
  const domCh1 = document.getElementById('val-ch1');
  const domCh2 = document.getElementById('val-ch2');
  const domError = document.getElementById('val-error');
  const domLatency = document.getElementById('val-latency');
  const domModelBadge = document.getElementById('model-badge');
  const domStatusText = document.getElementById('status-text');
  const domLed = document.getElementById('led-bulb');
  // ---------------------------------------------------------
  // 3. WebSocket 工业遥测数据流接入（SCADA 协议风格）
  // ---------------------------------------------------------
  function connectDataStream() {
    const ws = new WebSocket("ws://127.0.0.1:8765");

    ws.onopen = () => {
      // 链路建立 — 状态指示灯变绿，模拟工业设备在线
      domStatusText.textContent = "DATA LINK ACTV";
      domStatusText.style.color = "#00ff00";
      domLed.classList.add("online");
    };

    ws.onmessage = (event) => {
      const payload = JSON.parse(event.data);

      // 更新顶部模型标识
      domModelBadge.textContent = `MODEL: [ ${payload.model_type} ]`;

      // 更新右侧 SCADA 遥测读数（保留 3 位小数）
      domCh1.textContent = payload.ch1_actual.toFixed(3);
      domCh2.textContent = payload.ch2_predict.toFixed(3);
      domError.textContent = payload.error_abs.toFixed(3);
      domLatency.textContent = payload.latency_ms.toFixed(1) + " ms";

      // 滑动窗口缓冲区管理
      dataBuffer.push(payload);
      if (dataBuffer.length > MAX_POINTS) {
        dataBuffer.shift();
      }

      // 动态 Y 轴自动扩域 — 确保极大值极小值始终可见（含 15% 边距）
      let bufMin = Infinity, bufMax = -Infinity;
      dataBuffer.forEach(d => {
        if (d.ch1_actual < bufMin) bufMin = d.ch1_actual;
        if (d.ch1_actual > bufMax) bufMax = d.ch1_actual;
        if (d.ch2_predict < bufMin) bufMin = d.ch2_predict;
        if (d.ch2_predict > bufMax) bufMax = d.ch2_predict;
      });
      const padding = Math.max((bufMax - bufMin) * 0.15, 0.2);
      const newMin = bufMin - padding;
      const newMax = bufMax + padding;
      if (newMin < yMin || newMax > yMax) {
        yMin = Math.min(yMin, newMin);
        yMax = Math.max(yMax, newMax);
        // 向整数取整，方便读数
        yMin = Math.floor(yMin * 2) / 2;   // 步进 0.5
        yMax = Math.ceil(yMax * 2) / 2;
        redrawGridAndAxis();
        // 重新映射现有路径
        lineCh1.y(d => yScale(d.ch1_actual));
        lineCh2.y(d => yScale(d.ch2_predict));
      }

      // D3.js 高性能增量重绘（仅更新路径数据，不重建 DOM）
      pathCh1.datum(dataBuffer).attr("d", lineCh1);
      pathCh2.datum(dataBuffer).attr("d", lineCh2);
    };

    ws.onclose = () => {
      // 链路断开 — 状态指示灯变红，3 秒后自动重连
      domStatusText.textContent = "SYS OFFLINE";
      domStatusText.style.color = "#ff3333";
      domLed.classList.remove("online");
      setTimeout(connectDataStream, 3000);
    };
  }

  // 启动 WebSocket 连接
  connectDataStream();
</script>
</body>
</html>
